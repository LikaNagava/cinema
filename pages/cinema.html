<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SkyCinema — Кинотеатры</title>
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/carts.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="shortcut icon" href="../media/favicon.ico">
    <script src="https://api-maps.yandex.ru/2.1/?apikey=a239d242-d6cf-4985-a459-db777a291348&lang=ru_RU"></script>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="glass">
        <div class="logo-city-group">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none; color: inherit;">SKY<span>CINEMA</span></a>
            </div>
            <div class="city-selector">
                <img src="../media/map.png" alt="карта" height="25">
                <select id="citySelectHeader" class="glass-select-header"></select>
            </div>
        </div>

        <nav class="desktop-nav">
            <ul>
                <li><a href="../index.html">Афиша</a></li>
                <li><a href="films.html">Фильмы</a></li>
                <li><a href="#" class="active">Кинотеатры</a></li>
                <li><a href="stocks.html">Акции</a></li>
            </ul>
        </nav>

        <div class="header-right">
            <div class="search-box d-none d-md-flex">
                <input type="text" id="searchInput" placeholder="Поиск по странице..." class="glass-input">
                <img src="../media/magnifier.png" alt="Поиск" class="search-icon">
            </div>
            <div class="burger-menu" id="burgerBtn">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>
    <div class="mobile-nav-container" id="mobileNav">
        <ul class="mobile-ul">
            <li><a href="../index.html">Афиша</a></li>
            <li><a href="films.html">Фильмы</a></li>
            <li><a href="cinema.html">Кинотеатры</a></li>
            <li><a href="stocks.html">Акции</a></li>
        </ul>
    </div>

    <main class="cinemas-main">
        <div class="container-fluid px-lg-5 px-md-4 px-3">
            <div class="breadcrumbs">
                <a href="../index.html">Главная</a> /
                <span>Кинотеатры</span>
            </div>
            <h2 class="section-title">Кинотеатры <span id="currentCityName">Москвы</span></h2>
            <div class="row g-4">
                <div class="col-lg-7 col-md-12">
                    <div class="cinemas-list" id="cinemasList"></div>
                </div>
                <div class="col-lg-5 col-md-12">
                    <div class="cinemas-map">
                        <div id="map" style="height: 550px; width: 100%; border-radius: 24px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="glass">
        <p>© 2026 SkyCinema. Все права защищены.</p>
    </footer>

    <script src="../bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/cinema.js"></script>
</body>

</html>
