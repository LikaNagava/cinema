<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SkyCinema — Фильмы</title>
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/carts.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/large.css">
    <link rel="stylesheet" href="../css/laptop.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="shortcut icon" href="../media/favicon.ico">
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="glass">
        <div class="logo-city-group">
            <div class="logo">SKY<span>CINEMA</span></div>
            <div class="city-selector">
                <img src="../media/map.png" alt="карта" height="25">
                <select id="citySelectHeader" class="glass-select"></select>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Афиша</a></li>
                <li><a href="#" class="active">Фильмы</a></li>
                <li><a href="../pages/cinema.html">Кинотеатры</a></li>
                <li><a href="../pages/stocks.html">Акции</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по страницам..." class="glass-input">
                <img src="../media/magnifier.png" alt="Поиск" class="search-icon">
            </div>
        </div>
    </header>

    <main>
        <div class="container-fluid px-lg-5 px-md-4 px-3">
            <div class="breadcrumbs">
                <a href="../index.html">Главная</a> /
                <span>Фильмы</span>
            </div>
            <div class="films-header">
                <h2 class="section-title">Все фильмы</h2>
                <div class="filters-group">
                    <select id="genreFilter" class="glass-select">
                        <option value="all">Все жанры</option>
                    </select>
                    <button id="sortAZ" class="filter-btn">А–Я</button>
                    <button id="sortZA" class="filter-btn">Я–А</button>
                </div>
            </div>
            <div id="filmsGrid" class="movies-grid"></div>
            <div id="loadMoreBtn" class="load-more-btn"><span>Показать ещё</span><span style="font-size:20px;">▼</span>
            </div>
            <h2 class="section-title upcoming-title">Скоро в прокате</h2>
            <div id="upcomingGrid" class="movies-grid"></div>
        </div>
    </main>

    <footer class="glass">
        <p>© 2026 SkyCinema. Все права защищены.</p>
    </footer>

    <script src="../bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/movieCards.js"></script>
    <script src="../js/films.js"></script>
    <script src="../js/header.js"></script>
</body>

</html>
